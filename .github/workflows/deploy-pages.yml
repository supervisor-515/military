name: Deploy Expo web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Export web build
        run: npx expo export --platform web --output-dir dist

      - name: Prepare files for GitHub Pages project path
        run: |
          touch dist/.nojekyll
          find dist -type f -name "*.html" -print0 | xargs -0 sed -i 's|src="/|src="/military/|g; s|href="/|href="/military/|g'
          find dist -type f -name "*.js" -print0 | xargs -0 sed -i 's|"/_expo/|"/military/_expo/|g; s|"/assets/|"/military/assets/|g'
          find dist -type f -name "*.css" -print0 | xargs -0 sed -i 's|url(/|url(/military/|g'

      - name: Add SPA fallback for direct page refresh
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
