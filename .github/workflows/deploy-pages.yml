name: Deploy Expo web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Export web build
        run: npx expo export --platform web --output-dir dist

      - name: Prepare files for GitHub Pages project path
        shell: bash
        run: |
          set -e
          touch dist/.nojekyll

          while IFS= read -r -d '' file; do
            sed -i 's|src="/|src="/military/|g; s|href="/|href="/military/|g' "$file"
          done < <(find dist -type f -name "*.html" -print0)

          while IFS= read -r -d '' file; do
            sed -i 's|"/_expo/|"/military/_expo/|g; s|"/assets/|"/military/assets/|g' "$file"
          done < <(find dist -type f -name "*.js" -print0)

          while IFS= read -r -d '' file; do
            sed -i 's|url(/|url(/military/|g' "$file"
          done < <(find dist -type f -name "*.css" -print0)

      - name: Inject PWA tags into HTML
        shell: bash
        run: |
          python3 - <<'PY'
          head = """    <link rel="manifest" href="/military/manifest.json" />
              <meta name="theme-color" content="#0B1014" />
              <link rel="icon" type="image/png" href="/military/favicon-32.png" />
              <link rel="apple-touch-icon" href="/military/icons/apple-touch-icon.png" />
              <meta name="mobile-web-app-capable" content="yes" />
              <meta name="apple-mobile-web-app-capable" content="yes" />
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
              <meta name="apple-mobile-web-app-title" content="군월급" />
            """
          body = """  <script>
                if ('serviceWorker' in navigator) {
                  window.addEventListener('load', function () {
                    navigator.serviceWorker.register('/military/sw.js').catch(function () {});
                  });
                }
              </script>
            """
          path = "dist/index.html"
          with open(path, encoding="utf-8") as f:
              s = f.read()
          s = s.replace("</head>", head + "</head>", 1)
          s = s.replace("</body>", body + "</body>", 1)
          with open(path, "w", encoding="utf-8") as f:
              f.write(s)
          PY

      - name: Add SPA fallback for direct page refresh
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
